media:
  input: public
  output: /
components:
  seo:
    type: object
    label: SEO
    fields:
      - name: title
        type: string
      - name: description
        type: text 
content:
  - name: home
    label: Home
    type: file
    path: src/pages/home.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/Layout.astro" }
      - name: sections
        type: block
        list: true
        blockKey: type
        blocks:
          - name: hero
            fields:
              - name: title
                type: string
              - name: content
                type: string
              - name: cover
                label: Cover image
                type: image
                options:
                  media: images
                  path: public/images
          - name: text
            fields:
              - name: body
                type: rich-text
          - name: cta
            fields:
              - name: button
                type: object
                fields:
                  - name: label
                    type: string
                  - name: url
                    type: string
          - name: faqs
            fields:
              - name: items
                type: object
                list: true
                fields:
                  - name: heading
                    type: string
                  - name: text
                    type: rich-text
                  - name: cover
                    label: Cover image
                    type: image
                    options:
                      media: images
                      path: public/images
          - name: gallery
            label: Gallery
            type: image
            options:
              multiple:
                max: 6
              unique: true
              extensions: [jpg, png, webp]
              rename: true
          - name: seo
            component: seo
            label: Meta
  - name: about
    label: About
    type: file
    path: src/pages/about.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/AboutLayout.astro" }
      - { name: title, label: Title, type: string }
      - { name: body, label: Body, type: rich-text, options: { input: public/assets, output: /assets } }
  - name: posts
    label: Blog
    type: collection
    path: src/content/blog
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: author, label: Author, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Date, type: date }
      - { name: title, label: Title, type: string, required: true }
      - { name: ogImage, label: Title, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - name: topics
        type: reference
        options:
          collection: topics
          multiple: true
          min: 1
          max: 5
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - name: seo
        component: seo
        label: Meta
      - { name: body, label: Body, type: rich-text }
  - name: topics
    label: Topics
    type: collection
    path: src/content/topics
    view:
      fields: [ title ]
    fields:
      - { name: title, label: Title, type: string }